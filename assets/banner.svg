<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#0f1a2b"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E9EF7"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E9EF7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2E9EF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle dot grid -->
  <g opacity="0.12">
    <path d="M0 0 H1200 M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200" stroke="#3B82F6" stroke-width="0.5"/>
  </g>

  <!-- neural network motif, right side -->
  <g transform="translate(760,0)">
    <circle cx="220" cy="150" r="90" fill="url(#glow)"/>

    <g stroke="#2E9EF7" stroke-width="1.4" opacity="0.55">
      <line x1="60" y1="70" x2="180" y2="60"/>
      <line x1="60" y1="70" x2="170" y2="150"/>
      <line x1="60" y1="140" x2="170" y2="150"/>
      <line x1="60" y1="140" x2="180" y2="60"/>
      <line x1="60" y1="210" x2="170" y2="150"/>
      <line x1="60" y1="210" x2="180" y2="235"/>
      <line x1="170" y1="150" x2="300" y2="90"/>
      <line x1="170" y1="150" x2="300" y2="150"/>
      <line x1="170" y1="150" x2="300" y2="210"/>
      <line x1="180" y1="60" x2="300" y2="90"/>
      <line x1="180" y1="235" x2="300" y2="210"/>
    </g>

    <g fill="#7C5CFF">
      <circle cx="60" cy="70" r="5"/>
      <circle cx="60" cy="140" r="5"/>
      <circle cx="60" cy="210" r="5"/>
    </g>
    <g fill="#2E9EF7">
      <circle cx="180" cy="60" r="6"/>
      <circle cx="170" cy="150" r="7"/>
      <circle cx="180" cy="235" r="6"/>
    </g>
    <g fill="#22D3B5">
      <circle cx="300" cy="90" r="5"/>
      <circle cx="300" cy="150" r="5"/>
      <circle cx="300" cy="210" r="5"/>
    </g>
  </g>

  <!-- left side text -->
  <g font-family="Verdana, Segoe UI, sans-serif">
    <text x="60" y="118" font-size="46" font-weight="bold" fill="#F0F6FC">Danish Mehmood</text>

    <rect x="61" y="132" width="230" height="3" fill="url(#accent)"/>

    <text x="60" y="172" font-size="20" fill="#8B949E">BBIT Student &#183; Aspiring Data Scientist</text>
    <text x="60" y="200" font-size="20" fill="#8B949E">&amp; Machine Learning Engineer</text>

    <text x="60" y="248" font-size="15" fill="#2E9EF7" font-weight="bold">PYTHON</text>
    <text x="165" y="248" font-size="15" fill="#7C5CFF" font-weight="bold">SQL</text>
    <text x="225" y="248" font-size="15" fill="#22D3B5" font-weight="bold">MACHINE LEARNING</text>
    <text x="440" y="248" font-size="15" fill="#F778BA" font-weight="bold">AI</text>
  </g>
</svg>
